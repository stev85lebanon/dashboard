<!doctype html>
<html>
  <head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- LOGIN -->
    <div id="login">
      <h2>Select your name</h2>
      <select id="userName">
        <option value="">Select user</option>
        <option value="amir">Amir</option>
        <option value="casper">Casper (Leader)</option>
        <option value="john">John</option>
        <option value="lina">Lina</option>
        <option value="mustafa">Mustafa</option>
        <option value="sara">Sara</option>
        <option value="yasin">Yasin</option>
      </select>
      <select id="role">
        <option value="employee">Employee</option>
        <option value="leader">Leader</option>
      </select>

      <button onclick="login()">Enter</button>
    </div>

    <!-- APP -->
    <div id="app" style="display: none">
      <!-- HEADER -->
      <div class="header">
        📊 Hybrid Leadership Dashboard
        <button onclick="leave()">Leave</button>
      </div>

      <!-- LEADER PANEL -->
      <div id="leaderPanel">
        <h3>👨‍💼 Leader Panel</h3>
        <input id="leaderInput" placeholder="Write instruction..." />
        <button onclick="sendInstruction()">Send</button>
        <input id="taskInput" placeholder="Assign task..." />

        <select id="taskUserSelect"></select>

        <button onclick="assignTask()">Assign Task</button>
      </div>
      <div id="leaderMessages" class="leader-messages"></div>
      <!-- OVERVIEW (NEW) -->
      <div class="overview">
        <div class="box available"><b id="available"></b><br />Available</div>
        <div class="box focused"><b id="focused"></b><br />Focused</div>
        <div class="box busy"><b id="busy"></b><br />Busy</div>
      </div>
      <div class="task-panel">
        <h3>📌 My Tasks</h3>
        <div id="taskList"></div>
      </div>
      <!-- DASHBOARD -->
      <div id="dashboard"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
