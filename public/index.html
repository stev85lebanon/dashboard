<!doctype html>
<html>
  <head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- LOGIN -->
    <div id="login">
      <h2>Select your name</h2>
      <input id="userName" placeholder="Enter your name" />

      <select id="role">
        <option value="employee">Employee</option>
        <option value="leader">Leader</option>
      </select>

      <button onclick="login()">Enter</button>
    </div>

    <!-- APP -->
    <div id="app" style="display: none">
      <!-- HEADER -->
      <div class="header">📊 Hybrid Leadership Dashboard</div>

      <!-- LEADER PANEL -->
      <div id="leaderPanel">
        <h3>👨‍💼 Leader Panel</h3>
        <input id="leaderInput" placeholder="Write instruction..." />
        <button onclick="sendInstruction()">Send</button>
      </div>
      <div id="leaderMessage"></div>

      <!-- OVERVIEW (NEW) -->
      <div class="overview">
        <div class="box available"><b id="available"></b><br />Available</div>
        <div class="box focused"><b id="focused"></b><br />Focused</div>
        <div class="box busy"><b id="busy"></b><br />Busy</div>
      </div>

      <!-- DASHBOARD -->
      <div id="dashboard"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
