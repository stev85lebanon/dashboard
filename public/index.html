<!doctype html>
<html>
  <head>
    <title>Dashboard</title>

    <style>
      body {
        font-family: Arial;
      }

      #leaderMessages {
        height: 200px;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 10px;
      }

      .date-label {
        text-align: center;
        color: gray;
        margin: 10px 0;
      }

      .task {
        background: #eef;
        margin: 5px;
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <div id="login">
      <select id="userName">
        <option value="casper">Casper (Leader)</option>
        <option value="john">John</option>
        <option value="lina">Lina</option>
      </select>

      <button onclick="login()">Login</button>
    </div>

    <div id="app" style="display: none">
      <h2>🔔 Notifications</h2>
      <div id="leaderMessages"></div>

      <h2>📌 My Tasks</h2>
      <div id="tasks"></div>

      <div id="leaderPanel">
        <h3>Leader Panel</h3>

        <input id="leaderInput" placeholder="Send message..." />
        <button onclick="sendInstruction()">Send to All</button>

        <br /><br />

        <input id="taskInput" placeholder="Assign task..." />
        <select id="taskUser"></select>
        <button onclick="assignTask()">Assign Task</button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
